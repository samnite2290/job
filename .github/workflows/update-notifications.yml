name: Update notifications from Fancode

on:
  schedule:
    # প্রতি ১৫ মিনিট পরপর রান হবে
    - cron: '*/15 * * * *'
  workflow_dispatch:   # ম্যানুয়ালি রান করার জন্য

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Create Python script
        run: |
          cat > update_script.py << 'SCRIPT_END'
          import json
          import urllib.request
          import urllib.error
          import sys
          import os
          from datetime import datetime

          # FANCODE সিক্রেট থেকে URL নেওয়া
          fancode_url = os.environ.get('FANCODE_URL')
          if not fancode_url:
              print("ERROR: FANCODE_URL environment variable not set")
              sys.exit(1)

          print(f"Fetching data from: {fancode_url}")

          try:
              # API থেকে ডাটা fetch করা
              req = urllib.request.Request(fancode_url)
              req.add_header('User-Agent', 'Mozilla/5.0')
              
              with urllib.request.urlopen(req, timeout=30) as response:
                  raw_data = response.read().decode('utf-8')
                  data = json.loads(raw_data)
              
              print(f"Successfully fetched data, type: {type(data)}")
              
              # 'matches' array খোঁজা
              matches = None
              if isinstance(data, dict) and 'matches' in data:
                  matches = data['matches']
              elif isinstance(data, list):
                  matches = data
              else:
                  print(f"Unknown data structure. Keys: {data.keys() if isinstance(data, dict) else 'not a dict'}")
                  sys.exit(1)
              
              if not matches:
                  print("No matches found")
                  # খালি array সংরক্ষণ
                  with open('notifications.json', 'w') as f:
                      json.dump([], f, indent=2)
                  sys.exit(0)
              
              print(f"Found {len(matches)} matches")
              
              # notifications array তৈরি
              notifications = []
              
              for match in matches:
                  try:
                      # startTime থেকে Date & Time বানানো
                      start_time = match.get('startTime', '')
                      if not start_time:
                          continue
                      
                      # ফরম্যাট: "04:30:00 PM 28-04-2026" -> "28-04-2026-04:30pm"
                      parts = start_time.rsplit(' ', 1)
                      if len(parts) == 2:
                          time_part = parts[0]
                          date_part = parts[1]
                          # সেকেন্ড বাদ দেওয়া
                          time_part = time_part.rsplit(':', 1)[0]
                          # lowercase am/pm
                          time_part = time_part.lower()
                          date_time = f"{date_part}-{time_part}"
                      else:
                          date_time = start_time
                      
                      # টাইটেল: event_name
                      title = match.get('event_name', 'Unknown Event')
                      
                      # সাবটাইটেল: match_name
                      subtitle = match.get('match_name', 'Unknown Match')
                      
                      # ইমেজ: src
                      image = match.get('src', '')
                      
                      notification = {
                          "Date & Time": date_time,
                          "Title": title,
                          "Subtitle": subtitle,
                          "Image": image
                      }
                      notifications.append(notification)
                      print(f"Added: {title} - {subtitle}")
                      
                  except Exception as e:
                      print(f"Error processing match: {e}")
                      continue
              
              # ফাইল overwrite করা
              with open('notifications.json', 'w', encoding='utf-8') as f:
                  json.dump(notifications, f, indent=2, ensure_ascii=False)
              
              print(f"SUCCESS: Updated notifications.json with {len(notifications)} items")
              
          except urllib.error.URLError as e:
              print(f"URL Error: {e}")
              sys.exit(1)
          except json.JSONDecodeError as e:
              print(f"JSON Parse Error: {e}")
              sys.exit(1)
          except Exception as e:
              print(f"Unexpected error: {e}")
              sys.exit(1)
          SCRIPT_END

      - name: Run Python script
        env:
          FANCODE_URL: ${{ secrets.FANCODE }}
        run: python3 update_script.py

      - name: Check if file changed
        id: check_changes
        run: |
          if git diff --quiet notifications.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to notifications.json"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notifications.json
          git commit -m "Auto-update notifications.json from Fancode [skip ci]"
          git push
          echo "Successfully pushed updates"
